<!DOCTYPE html> <html lang="pt-br"> <head> <meta charset="UTF-8"> <title>Amigo Secreto</title> <style> body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #029aff, #cc0000); color: white; text-align: center; } h1 { margin-top: 20px; font-size: 40px; text-shadow: 2px 2px 5px black; } .container { margin: 20px auto; width: 90%; max-width: 500px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; box-shadow: 0 0 15px black; } input { width: 70%; padding: 10px; border: none; border-radius: 8px; outline: none; margin-bottom: 10px; } button { padding: 10px 15px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; } .add { background: #00aaff; color: white; } .draw { background: #ff3333; color: white; } ul { list-style: none; padding: 0; } li { background: rgba(255,255,255,0.15); margin: 5px; padding: 8px; border-radius: 8px; } .result { margin-top: 20px; font-size: 22px; font-weight: bold; color: white; text-shadow: 1px 1px 4px black; } .gift { width: 120px; margin-top: 10px; } </style> </head> <body> <h1>🎁 Amigo Secreto 🎁</h1> <div class="container"> <img class="gift" src="https://cdn-icons-png.flaticon.com/512/869/869636.png" alt="presente"> <input type="text" id="nome" placeholder="Digite o nome do participante"> <br> <button class="add" onclick="adicionar()">Adicionar</button> <button class="draw" onclick="sortear()">Sortear</button> <ul id="lista"></ul> <div class="result" id="resultado"></div> </div> <script> let participantes = []; function adicionar() { let nome = document.getElementById("nome").value.trim(); if (nome === "") { alert("Digite um nome!"); return; } participantes.push(nome); document.getElementById("nome").value = ""; atualizarLista(); } function atualizarLista() { let lista = document.getElementById("lista"); lista.innerHTML = ""; participantes.forEach((p) => { let li = document.createElement("li"); li.textContent = p; lista.appendChild(li); }); } function sortear() { if (participantes.length < 2) { alert("Adicione pelo menos 2 participantes!"); return; } let indice = Math.floor(Math.random() * participantes.length); let escolhido = participantes[indice]; document.getElementById("resultado").innerHTML = "🎉 O sorteado foi: " + escolhido + " 🎉"; } </script> </body> </html>
